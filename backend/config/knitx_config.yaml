project:
  name: KnitX
  environment: development

model:
  path: models/knitx_best.pt
  confidence: 0.25
  image_size: 640
  device: cpu
  class_names:
    0: stain_or_spots
    1: needle_line
    2: holes

class_remap:
  enabled: true
  map:
    0: 2
    2: 0

inspection:
  roll_id: ROLL_001
  session_id_prefix: KNITX
  gsm: 202.0
  roll_weight_kg: 110.8
  operator: operator
  machine_id: PI5_LINE_01

calibration:
  # Measure a known ruler/marker in the camera view and update this value.
  mm_per_pixel: 0.20

preprocessing:
  gaussian_kernel: 5
  threshold_block_size: 31
  threshold_c: 5
  canny_low: 50
  canny_high: 150
  clahe_clip_limit: 2.0
  clahe_tile_grid_size: 8

contours:
  min_area: 120
  max_area_ratio: 0.60
  min_aspect_ratio: 0.05
  max_aspect_ratio: 20.0
  reject_if_no_contours: false

tracker:
  iou_threshold: 0.30
  max_lost: 5
  min_hits_image: 1
  min_hits_video: 3
  cooldown_seconds: 3.0

runtime:
  mode: image
  source: ""
  camera_index: 0
  display: true
  save_visualizations: false
  stop_key: q

storage:
  provider: local
  database_path: data/database/knitx_inspection.db
  defect_image_dir: data/defect_images
  report_dir: data/reports
  folder_mode: auto_date_order
  custom_folder_name: KnitX Reports
  date_folder_format: "%d-%m-%Y"
  shortener: none
  google_drive:
    credentials_path: config/google_drive_credentials.json
    token_path: data/google_drive_token.json
    parent_folder_id: ""
    parent_folder_name: KnitX Reports
    create_parent_folder: true

visualization:
  mask_alpha: 0.35
  show_heatmap: false
  window_name: KnitX Industrial Inspection
